<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellow 爬虫监控面板</title>
<style>
  :root {
    --bg: #0a0a14; --bg2: #12121f; --bg3: #1a1a2e; --card: #14142a;
    --text: #e0e0e8; --text2: #7878aa; --text3: #4a4a6a;
    --accent: #f0c040; --accent2: #e8a020;
    --success: #4caf84; --danger: #e05555; --warning: #e8a020; --info: #6495ed;
    --purple: #9c7cf4; --cyan: #40d0d0;
    --border: rgba(255,255,255,0.06); --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
  .container { max-width: 1400px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 22px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge.running { background: var(--success); color: #fff; animation: pulse 2s infinite; }
  .badge.stopped { background: var(--danger); color: #fff; }
  .badge.loading { background: var(--info); color: #fff; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text2); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; animation: pulse 1s infinite; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
  .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.accent::after { background: var(--accent); }
  .stat-card.success::after { background: var(--success); }
  .stat-card.danger::after { background: var(--danger); }
  .stat-card.info::after { background: var(--info); }
  .stat-card.purple::after { background: var(--purple); }
  .stat-card.cyan::after { background: var(--cyan); }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card.accent .value { color: var(--accent); }
  .stat-card.success .value { color: var(--success); }
  .stat-card.danger .value { color: var(--danger); }
  .stat-card.info .value { color: var(--info); }
  .stat-card.purple .value { color: var(--purple); }
  .stat-card.cyan .value { color: var(--cyan); }
  .stat-card .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .section-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .section-header h2 { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .section-header .count { font-size: 11px; color: var(--text2); background: var(--bg3); padding: 2px 10px; border-radius: 20px; }
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin: 12px 18px; }
  .progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .progress-bar .fill.green { background: linear-gradient(90deg, #2d8a5e, #4caf84); }
  .progress-bar .fill.yellow { background: linear-gradient(90deg, #c88a10, #f0c040); }
  .progress-bar .fill.red { background: linear-gradient(90deg, #b03030, #e05555); }
  .progress-label { padding: 0 18px 12px; font-size: 11px; color: var(--text2); display: flex; justify-content: space-between; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 14px; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg3); position: sticky; top: 0; z-index: 1; }
  td { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .tag.ok { background: rgba(76,175,132,0.15); color: var(--success); }
  .tag.warn { background: rgba(232,160,32,0.15); color: var(--warning); }
  .tag.bad { background: rgba(224,85,85,0.15); color: var(--danger); }
  .tag.info { background: rgba(100,149,237,0.15); color: var(--info); }
  .tag.purple { background: rgba(156,124,244,0.15); color: var(--purple); }
  .scroll-table { max-height: 500px; overflow-y: auto; }
  .scroll-table::-webkit-scrollbar { width: 5px; }
  .scroll-table::-webkit-scrollbar-track { background: var(--bg3); }
  .scroll-table::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }
  .chart-row { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
  .chart-box { flex: 1; min-width: 280px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .bar-label { font-size: 10px; color: var(--text2); min-width: 36px; text-align: right; }
  .bar-track { flex: 1; height: 16px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 5px; font-size: 9px; color: #fff; font-weight: 600; min-width: fit-content; transition: width 0.5s; }
  .filter-bar { padding: 10px 18px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid var(--border); align-items: center; }
  .filter-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .search-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 20px; font-size: 11px; outline: none; width: 180px; }
  .search-input:focus { border-color: var(--accent); }
  .log-area { padding: 14px; max-height: 280px; overflow-y: auto; font-size: 11px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; color: var(--text2); white-space: pre-wrap; line-height: 1.6; }
  .log-area .ok { color: var(--success); }
  .log-area .err { color: var(--danger); }
  .log-area .info { color: var(--info); }
  .log-area .warn { color: var(--warning); }
  .log-line { padding: 1px 0; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } .grid { grid-template-columns: repeat(2, 1fr); } }
  .kv-table { padding: 12px 18px; }
  .kv-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .kv-row:last-child { border-bottom: none; }
  .kv-key { color: var(--text2); }
  .kv-val { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🕷️ 集书阁爬虫监控 <span class="badge loading" id="statusBadge">连接中...</span></h1>
    <div class="header-right">
      <span class="live-dot" id="liveDot"></span>
      <span id="lastUpdate">--</span>
      <span style="color:var(--text3)">|</span>
      <span>Node进程: <strong id="nodeProcs">-</strong></span>
    </div>
  </div>

  <div class="grid" id="statsGrid"></div>

  <div class="two-col">
    <div class="section">
      <div class="section-header"><h2>📊 章节数分布</h2></div>
      <div id="chDistChart"></div>
    </div>
    <div class="section">
      <div class="section-header"><h2>📦 内容量分布</h2></div>
      <div id="sizeDistChart"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-header"><h2>🔍 爬虫详情</h2></div>
      <div id="crawlDetails"></div>
    </div>
    <div class="section">
      <div class="section-header"><h2>⏱️ 最近更新的书籍</h2></div>
      <div class="scroll-table" style="max-height:260px">
        <table><thead><tr><th>书名</th><th>章节</th><th>大小</th><th>更新时间</th></tr></thead>
        <tbody id="recentTable"></tbody></table>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>📚 全部书籍</h2>
      <span class="count" id="bookCount">0</span>
    </div>
    <div class="filter-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索书名...">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="complete">完整 ≥20章</button>
      <button class="filter-btn" data-filter="short">缺章节 <20</button>
      <button class="filter-btn" data-filter="quote">引号问题</button>
      <button class="filter-btn" data-filter="empty">空章节</button>
      <button class="filter-btn" data-filter="long">长篇</button>
      <button class="filter-btn" data-filter="story">短篇</button>
    </div>
    <div class="scroll-table" style="max-height:600px">
      <table>
        <thead><tr><th>#</th><th>书名</th><th>章</th><th>字数</th><th>行数</th><th>均章长</th><th>空章</th><th>引号</th><th>类型</th><th>爬取</th><th>状态</th></tr></thead>
        <tbody id="bookTable"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><h2>📋 实时日志</h2></div>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<script>
let data = null, currentFilter = 'all';

async function loadData() {
  try {
    const resp = await fetch('/api/data?t=' + Date.now());
    data = await resp.json();
    render();
    const badge = document.getElementById('statusBadge');
    if (data.process.running) { badge.textContent = '运行中'; badge.className = 'badge running'; }
    else { badge.textContent = '空闲'; badge.className = 'badge stopped'; }
    document.getElementById('liveDot').style.background = data.process.running ? 'var(--success)' : 'var(--text3)';
    document.getElementById('lastUpdate').textContent = '更新: ' + new Date(data.updatedAt).toLocaleTimeString();
    document.getElementById('nodeProcs').textContent = data.process.nodeProcesses;
  } catch (e) {
    document.getElementById('statusBadge').textContent = '离线';
    document.getElementById('statusBadge').className = 'badge stopped';
  }
}

function fmt(n) { return n >= 1024*1024 ? (n/1024/1024).toFixed(1)+'MB' : n >= 1024 ? (n/1024).toFixed(1)+'KB' : n+'B' }

function render() {
  if (!data) return;
  const s = data.stats, c = data.crawl, r = data.recrawl;
  document.getElementById('statsGrid').innerHTML = [
    { l:'书籍库总量', v:data.index.total, s:`集书阁 ${data.index.jisge} · 其他 ${data.index.other}`, c:'accent' },
    { l:'总章节数', v:s.totalChapters, s:`均值 ${s.avgChaptersPerBook} · 中位数 ${s.medianChapters} · 最多 ${s.maxChapters}`, c:'success' },
    { l:'总字数', v:(s.totalWords/10000).toFixed(1)+'万', s:`${s.totalLines.toLocaleString()} 行 · ${fmt(s.totalContent)}`, c:'info' },
    { l:'完整书籍', v:s.completeBooks, s:`占比 ${((s.completeBooks/data.index.jisge)*100).toFixed(1)}%`, c:'success' },
    { l:'缺章节', v:s.shortBooks, s:`占比 ${((s.shortBooks/data.index.jisge)*100).toFixed(1)}%`, c:s.shortBooks>50?'danger':'warn' },
    { l:'引号问题', v:s.quoteIssueBooks, s:`共 ${s.totalQuoteIssues.toLocaleString} 处`, c:s.quoteIssueBooks>0?'danger':'success' },
    { l:'空章节', v:s.emptyChapters, s:'无内容的章节', c:s.emptyChapters>0?'warn':'success' },
    { l:'简介干净', v:s.descClean, s:`脏数据 ${s.descDirty}`, c:'purple' },
    { l:'发现链接', v:c.allBooks, s:`长篇 ${c.longBooks} · 短篇 ${c.shortStoryBooks}`, c:'info' },
    { l:'已爬取', v:c.crawled, s:`成功率 ${c.allBooks>0?(c.crawled/c.allBooks*100).toFixed(1):0}%`, c:'success' },
    { l:'爬取失败', v:c.failed, s:`待处理 ${c.pending}`, c:'danger' },
    { l:'已重爬补全', v:r.done, s:`目标 ${r.total}`, c:'cyan' },
    { l:'文件系统', v:fmt(data.fileStat.totalSize), s:`${data.fileStat.fileCount} 个JSON文件`, c:'purple' },
    { l:'最大书籍', v:s.maxChapters+'章', s:s.maxChaptersBook, c:'accent' },
  ].map(d => `<div class="stat-card ${d.c}"><div class="label">${d.l}</div><div class="value">${d.v}</div><div class="sub">${d.s}</div></div>`).join('');

  renderCharts(); renderCrawlDetails(); renderRecent(); renderTable(); renderLog();
}

function renderCharts() {
  const dist = data.chCountDist || {};
  const colors = ['#e05555','#e8a020','#f0c040','#6495ed','#4caf84','#9c7cf4','#40d0d0'];
  const order = ['0','1-5','6-10','11-20','21-50','51-100','100+'];
  const max = Math.max(1, ...order.map(k => dist[k] || 0));
  document.getElementById('chDistChart').innerHTML = '<div style="padding:14px">' + order.map((k,i) => {
    const c = dist[k]||0, pct = c/max*100;
    return `<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i]}">${c}</div></div></div>`;
  }).join('') + '</div>';

  const books = data.books||[];
  const sz = {'<1KB':0,'1-5KB':0,'5-20KB':0,'20-50KB':0,'50-100KB':0,'100KB+':0};
  books.forEach(b => { const k=b.contentLen/1024; if(k<1)sz['<1KB']++;else if(k<5)sz['1-5KB']++;else if(k<20)sz['5-20KB']++;else if(k<50)sz['20-50KB']++;else if(k<100)sz['50-100KB']++;else sz['100KB']++; });
  const sKeys = Object.keys(sz), sMax = Math.max(1,...Object.values(sz));
  const sColors = ['#e05555','#e8a020','#f0c040','#6495ed','#4caf84','#9c7cf4'];
  document.getElementById('sizeDistChart').innerHTML = '<div style="padding:14px">' + sKeys.map((k,i) => {
    const c=sz[k], pct=c/sMax*100;
    return `<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${sColors[i]}">${c}</div></div></div>`;
  }).join('') + '</div>';
}

function renderCrawlDetails() {
  const c = data.crawl, s = data.stats;
  const successRate = c.allBooks>0 ? (c.crawled/c.allBooks*100).toFixed(1) : '0';
  const pcts = { crawled: c.crawled/c.allBooks*100, failed: c.failed/c.allBooks*100, pending: c.pending/c.allBooks*100 };
  document.getElementById('crawlDetails').innerHTML = `
    <div class="progress-bar"><div class="fill green" style="width:${pcts.crawled}%"></div></div>
    <div class="progress-label"><span>已爬取 ${c.crawled}</span><span>${successRate}%</span></div>
    <div class="kv-table">
      <div class="kv-row"><span class="kv-key">爬虫阶段</span><span class="kv-val">${c.phase}</span></div>
      <div class="kv-row"><span class="kv-key">发现页面</span><span class="kv-val">${c.discovered} 页</span></div>
      <div class="kv-row"><span class="kv-key">长篇书籍</span><span class="kv-val">${c.longBooks} 本</span></div>
      <div class="kv-row"><span class="kv-key">短篇故事</span><span class="kv-val">${c.shortStoryBooks} 本</span></div>
      <div class="kv-row"><span class="kv-key">平均每书字数</span><span class="kv-val">${(s.avgContentPerBook/1024).toFixed(1)} KB</span></div>
      <div class="kv-row"><span class="kv-key">平均每书章节</span><span class="kv-val">${s.avgChaptersPerBook} 章</span></div>
      <div class="kv-row"><span class="kv-key">最大章节数</span><span class="kv-val">${s.maxChapters} 章（${s.maxChaptersBook}）</span></div>
      <div class="kv-row"><span class="kv-key">重爬进度</span><span class="kv-val">${data.recrawl.done} / ${data.recrawl.total}</span></div>
      <div class="kv-row"><span class="kv-key">简介干净率</span><span class="kv-val">${data.index.jisge>0?((s.descClean/data.index.jisge)*100).toFixed(1):0}%</span></div>
      <div class="kv-row"><span class="kv-key">Node进程数</span><span class="kv-val">${data.process.nodeProcesses}</span></div>
    </div>`;
}

function renderRecent() {
  const rows = (data.recentBooks||[]).map(b => {
    const t = new Date(b.modified);
    const time = t.toLocaleTimeString();
    return `<tr><td style="font-weight:600">${b.title}</td><td>${b.chapters}</td><td>${fmt(b.size)}</td><td style="color:var(--text2)">${time}</td></tr>`;
  });
  document.getElementById('recentTable').innerHTML = rows.join('');
}

function renderTable() {
  let books = data.books||[];
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) books = books.filter(b => b.title.toLowerCase().includes(q) || b.id.toLowerCase().includes(q));
  if (currentFilter==='complete') books = books.filter(b => b.chapters >= 20);
  else if (currentFilter==='short') books = books.filter(b => b.chapters < 20);
  else if (currentFilter==='quote') books = books.filter(b => b.quoteIssues > 0);
  else if (currentFilter==='empty') books = books.filter(b => b.emptyChapters > 0);
  else if (currentFilter==='long') books = books.filter(b => b.isLong);
  else if (currentFilter==='story') books = books.filter(b => !b.isLong);
  document.getElementById('bookCount').textContent = books.length + ' / ' + (data.books||[]).length;
  document.getElementById('bookTable').innerHTML = books.map((b,i) => {
    const st = b.chapters>=20 ? '<span class="tag ok">完整</span>' : b.chapters>=10 ? '<span class="tag warn">偏少</span>' : '<span class="tag bad">缺失</span>';
    const qt = b.quoteIssues>0 ? `<span class="tag bad">${b.quoteIssues}</span>` : '<span class="tag ok">✓</span>';
    const tp = b.isLong ? '<span class="tag info">长篇</span>' : '<span class="tag purple">短篇</span>';
    const cs = b.crawlStatus==='crawled'?'<span class="tag ok">已爬</span>':b.crawlStatus==='failed'?'<span class="tag bad">失败</span>':b.crawlStatus==='pending'?'<span class="tag warn">待爬</span>':'<span class="tag" style="color:var(--text3)">无映射</span>';
    return `<tr><td style="color:var(--text3)">${i+1}</td><td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.title}</td><td>${b.chapters}</td><td>${(b.words/1000).toFixed(1)}k</td><td>${b.lines}</td><td>${b.avgChapterLen}</td><td>${b.emptyChapters>0?'<span class="tag bad">'+b.emptyChapters+'</span>':'-'}</td><td>${qt}</td><td>${tp}</td><td>${cs}</td><td>${st}</td></tr>`;
  }).join('');
}

function renderLog() {
  const s = data.stats, c = data.crawl, r = data.recrawl;
  const lines = [
    { t: 'ok', m: `[${new Date(data.updatedAt).toLocaleTimeString()}] 数据已刷新` },
    { t: 'info', m: `[爬虫] 阶段:${c.phase} | 发现:${c.allBooks} | 成功:${c.crawled} | 失败:${c.failed} | 待处理:${c.pending}` },
    { t: 'info', m: `[书籍] 集书阁:${data.index.jisge} | 其他:${data.index.other} | 总计:${data.index.total}` },
    { t: 'info', m: `[内容] ${s.totalChapters}章 | ${(s.totalWords/10000).toFixed(1)}万字 | ${s.totalLines}行 | ${fmt(s.totalContent)}` },
    { t: s.shortBooks>50?'warn':'ok', m: `[质量] 完整:${s.completeBooks} | 缺章节:${s.shortBooks} | 引号问题:${s.quoteIssueBooks}(${s.totalQuoteIssues}处) | 空章节:${s.emptyChapters}` },
    { t: 'info', m: `[重爬] 已完成:${r.done}/${r.total}` },
    { t: 'info', m: `[文件] ${data.fileStat.fileCount}个JSON | ${fmt(data.fileStat.totalSize)}` },
    { t: '', m: '' },
    { t: 'info', m: '--- 章节数 Top 10 ---' },
    ...(data.books||[]).slice(0,10).map((b,i) => ({ t:'', m:`  ${String(i+1).padStart(2)}. ${b.title.padEnd(20)} ${String(b.chapters).padStart(4)}章  ${(b.contentLen/1024).toFixed(1)}KB  ${b.words}字` })),
    { t: '', m: '' },
    { t: 'warn', m: '--- 缺失最严重 Top 10 ---' },
    ...(data.books||[]).filter(b=>b.chapters<20).slice(0,10).map((b,i) => ({ t:'err', m:`  ${String(i+1).padStart(2)}. ${b.title.padEnd(20)} 仅${b.chapters}章  引号问题:${b.quoteIssues}` })),
    { t: '', m: '' },
    { t: 'info', m: '--- 引号问题 Top 10 ---' },
    ...(data.books||[]).filter(b=>b.quoteIssues>0).sort((a,b)=>b.quoteIssues-a.quoteIssues).slice(0,10).map((b,i) => ({ t:'err', m:`  ${String(i+1).padStart(2)}. ${b.title.padEnd(20)} ${b.quoteIssues}处缺失` })),
  ];
  document.getElementById('logArea').innerHTML = lines.map(l => `<div class="log-line ${l.t}">${l.m}</div>`).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});
document.getElementById('searchInput').addEventListener('input', renderTable);

loadData();
setInterval(loadData, 1000);
</script>
</body>
</html>
